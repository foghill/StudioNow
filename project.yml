name: StudioNow
options:
  bundleIdPrefix: com.worthlessstudios
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
targets:
  StudioNow:
    type: application
    platform: iOS
    sources:
      - StudioNow
    info:
      path: StudioNow/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        NSLocationWhenInUseUsageDescription: "Used to show nearby studio spaces."
        UIUserInterfaceStyle: Light
        CFBundleIconName: AppIcon
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      SWIFT_VERSION: "6.0"
      PRODUCT_BUNDLE_IDENTIFIER: com.worthlessstudios.studionow
      DEVELOPMENT_TEAM: "R45KT4XDXH"
      CODE_SIGN_STYLE: Automatic
      CODE_SIGNING_REQUIRED: YES
      CODE_SIGNING_ALLOWED: YES
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
